<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OnlyPlay Golf - Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #153d26;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { opacity: 0.8; font-size: 0.95rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: white; text-decoration: underline; }
    .btn {
      display: inline-block;
      background: white;
      color: #153d26;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      margin-top: 1rem;
    }
    .btn-secondary {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OnlyPlay Golf</h1>
    <div class="spinner" id="spinner"></div>
    <p id="status">Opening in app...</p>
    <div id="fallback" style="display:none; margin-top: 1.5rem;">
      <a id="app-link" class="btn" href="#">Open in App</a>
      <br>
      <a id="web-link" class="btn-secondary" href="#">Reset on web instead</a>
    </div>
  </div>
  <script>
    (function() {
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');
      var type = params.get('type');

      if (type === 'recovery' && accessToken) {
        var appUrl = 'onlyplaygolf://auth/callback?access_token=' +
          encodeURIComponent(accessToken) +
          '&refresh_token=' + encodeURIComponent(refreshToken || '') +
          '&type=recovery';

        var webUrl = '/auth#' + hash;

        // Try to open the app immediately
        window.location.href = appUrl;

        // If we're still here after 1.5s, the app didn't open — show manual buttons
        // Do NOT auto-redirect to web (this was causing the issue)
        setTimeout(function() {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').textContent = 'Tap below to continue:';
          document.getElementById('fallback').style.display = 'block';
          document.getElementById('app-link').href = appUrl;
          document.getElementById('web-link').href = webUrl;
        }, 1500);
      } else {
        // Not a recovery link — redirect to main auth
        window.location.href = '/auth' + window.location.hash;
      }
    })();
  </script>
</body>
</html>
