<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OnlyPlay Golf - Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #153d26;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { opacity: 0.8; font-size: 0.95rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: white; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OnlyPlay Golf</h1>
    <div class="spinner"></div>
    <p id="status">Opening in app...</p>
    <p id="fallback" style="display:none; margin-top: 2rem;">
      <a href="#" id="web-reset-link">Reset password on web instead</a>
    </p>
  </div>
  <script>
    (function() {
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');
      var type = params.get('type');

      if (type === 'recovery' && accessToken) {
        // Open the iOS app via custom URL scheme with tokens as query params
        var appUrl = 'onlyplaygolf://auth/callback?access_token=' +
          encodeURIComponent(accessToken) +
          '&refresh_token=' + encodeURIComponent(refreshToken) +
          '&type=recovery';

        // Try to open the app
        window.location.href = appUrl;

        // If the app doesn't open (not installed), fall back to web after 2.5s
        setTimeout(function() {
          document.getElementById('status').textContent = 'App not installed? Reset on web:';
          document.getElementById('fallback').style.display = 'block';
          document.getElementById('web-reset-link').href = '/auth#' + hash;
        }, 2500);

        // Redirect to web auth page after 3s if still here
        setTimeout(function() {
          window.location.href = '/auth#' + hash;
        }, 3000);
      } else {
        // Not a recovery link — redirect to main auth
        window.location.href = '/auth' + window.location.hash;
      }
    })();
  </script>
</body>
</html>
